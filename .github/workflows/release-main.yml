name: Auto Release (Main)

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '17 */6 * * *'

permissions:
  contents: write

concurrency:
  group: smartblock-main-release
  cancel-in-progress: true

jobs:
  release:
    if: github.event_name != 'schedule' && github.actor != 'github-actions[bot]'
    runs-on: windows-2022

    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Download Dalamud SDK files
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest_dalamud.zip
          Expand-Archive -Force latest_dalamud.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Bump version in manifests
        id: bump
        shell: pwsh
        run: |
          $csproj = "SmartBlockChecker/SmartBlockChecker.csproj"
          [xml]$xml = Get-Content -Raw $csproj
          $current = [string]$xml.Project.PropertyGroup.Version
          if ([string]::IsNullOrWhiteSpace($current)) {
            throw "Missing <Version> in $csproj"
          }

          $parts = $current.Split(".")
          while ($parts.Count -lt 4) {
            $parts += "0"
          }

          $last = [int]$parts[$parts.Count - 1]
          $parts[$parts.Count - 1] = ($last + 1).ToString()
          $newVersion = ($parts -join ".")

          $xml.Project.PropertyGroup.Version = $newVersion
          $xml.Save((Resolve-Path $csproj))

          $pluginJsonPath = "SmartBlockChecker/SmartBlockChecker.json"
          $pluginJson = Get-Content -Raw $pluginJsonPath | ConvertFrom-Json
          $pluginJson.AssemblyVersion = $newVersion
          ($pluginJson | ConvertTo-Json -Depth 20) + "`n" | Set-Content -NoNewline:$false -Encoding UTF8 $pluginJsonPath

          $masterPath = "pluginmaster.json"
          $masterRaw = Get-Content -Raw $masterPath | ConvertFrom-Json
          if ($masterRaw -is [System.Array]) {
            $master = $masterRaw
          } else {
            $master = @($masterRaw)
          }

          $repo = "${{ github.repository }}"
          $tagName = "v$newVersion"
          $releaseAssetUrl = "https://github.com/$repo/releases/download/$tagName/latest.zip"

          $master[0].AssemblyVersion = $newVersion
          $master[0].DownloadLinkInstall = $releaseAssetUrl
          $master[0].DownloadLinkUpdate = $releaseAssetUrl
          if ($null -eq $master[0].PSObject.Properties["DownloadCount"]) {
            $master[0] | Add-Member -NotePropertyName DownloadCount -NotePropertyValue 0
          } elseif ($null -eq $master[0].DownloadCount) {
            $master[0].DownloadCount = 0
          }

          ($master | ConvertTo-Json -Depth 20 -AsArray) + "`n" | Set-Content -NoNewline:$false -Encoding UTF8 $masterPath

          "new_version=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build Release
        run: dotnet build --configuration Release

      - name: Create latest.zip
        shell: pwsh
        run: |
          $releaseDir = "SmartBlockChecker/bin/x64/Release"
          Compress-Archive -Force `
            -Path "$releaseDir/goat.png","$releaseDir/SmartBlockChecker.deps.json","$releaseDir/SmartBlockChecker.dll","$releaseDir/SmartBlockChecker.json" `
            -DestinationPath "latest.zip"

      - name: Verify packaged version
        shell: pwsh
        run: |
          $tmp = "verify_zip"
          if (Test-Path $tmp) { Remove-Item -Recurse -Force $tmp }
          New-Item -ItemType Directory -Path $tmp | Out-Null
          tar -xf latest.zip -C $tmp
          $manifest = Get-Content -Raw "$tmp/SmartBlockChecker.json" | ConvertFrom-Json
          if ($manifest.AssemblyVersion -ne "${{ steps.bump.outputs.new_version }}") {
            throw "Packaged version $($manifest.AssemblyVersion) does not match bumped version ${{ steps.bump.outputs.new_version }}"
          }

      - name: Commit and push version bump
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add SmartBlockChecker/SmartBlockChecker.csproj SmartBlockChecker/SmartBlockChecker.json pluginmaster.json

          if ((git diff --cached --name-only).Count -eq 0) {
            Write-Host "No version bump changes to commit."
            exit 0
          }

          git commit -m "ci: release v${{ steps.bump.outputs.new_version }} [skip ci]"
          git push origin HEAD:main

      - name: Tag release commit
        shell: pwsh
        run: |
          $tag = "v${{ steps.bump.outputs.new_version }}"
          git tag -f $tag
          git push origin "refs/tags/$tag" --force

      - name: Publish GitHub release asset
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "v${{ steps.bump.outputs.new_version }}"
          $repo = "${{ github.repository }}"
          gh release view $tag --repo $repo *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag latest.zip --repo $repo --clobber
          } else {
            gh release create $tag latest.zip --repo $repo --title $tag --notes "Automated release for $tag"
          }

      - name: Purge jsDelivr cache
        shell: pwsh
        run: |
          $purgeUrls = @(
            "https://purge.jsdelivr.net/gh/InTheWind222/SmartBlockChecker@main/pluginmaster.json",
            "https://purge.jsdelivr.net/gh/InTheWind222/SmartBlockCheccker@main/pluginmaster.json"
          )
          foreach ($url in $purgeUrls) {
            try {
              Invoke-WebRequest -UseBasicParsing -Uri $url | Out-Null
              Write-Host "Purged: $url"
            } catch {
              Write-Warning "Purge failed: $url -- $($_.Exception.Message)"
            }
          }

  refresh-download-count:
    needs:
      - release
    if: always() && needs.release.result != 'failure' && needs.release.result != 'cancelled'
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Refresh manifest download count
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEMETRY_STATS_URL: ${{ secrets.TELEMETRY_STATS_URL }}
        run: |
          $repo = "${{ github.repository }}"

          $masterPath = "pluginmaster.json"
          $masterRaw = Get-Content -Raw $masterPath | ConvertFrom-Json
          if ($masterRaw -is [System.Array]) {
            $master = $masterRaw
          } else {
            $master = @($masterRaw)
          }

          $currentVersion = [string]$master[0].AssemblyVersion
          if ([string]::IsNullOrWhiteSpace($currentVersion)) {
            throw "pluginmaster.json is missing AssemblyVersion"
          }

          $targetTag = "v$currentVersion"
          $totalDownloads = 0
          $targetAssetUrl = $null

          if (-not [string]::IsNullOrWhiteSpace($env:TELEMETRY_STATS_URL)) {
            try {
              $stats = Invoke-RestMethod -Uri $env:TELEMETRY_STATS_URL -Headers @{ Accept = "application/json" }
              if ($null -ne $stats.activeUsers) {
                $totalDownloads = [int]$stats.activeUsers
              }
            } catch {
              Write-Warning "Telemetry stats fetch failed. Falling back to release download counts. $($_.Exception.Message)"
            }
          }

          if ($totalDownloads -eq 0) {
            $headers = @{
              Authorization = "Bearer $env:GITHUB_TOKEN"
              Accept = "application/vnd.github+json"
              "X-GitHub-Api-Version" = "2022-11-28"
            }

            $releases = Invoke-RestMethod -Headers $headers -Uri "https://api.github.com/repos/$repo/releases?per_page=100"
            foreach ($release in $releases) {
              foreach ($asset in $release.assets) {
                if ($asset.name -eq "latest.zip") {
                  $totalDownloads += [int]$asset.download_count
                  if ($release.tag_name -eq $targetTag) {
                    $targetAssetUrl = [string]$asset.browser_download_url
                  }
                }
              }
            }
          }

          if ([string]::IsNullOrWhiteSpace($targetAssetUrl)) {
            $targetAssetUrl = "https://github.com/$repo/releases/download/$targetTag/latest.zip"
          }

          $master[0].DownloadLinkInstall = $targetAssetUrl
          $master[0].DownloadLinkUpdate = $targetAssetUrl

          if ($null -eq $master[0].PSObject.Properties["DownloadCount"]) {
            $master[0] | Add-Member -NotePropertyName DownloadCount -NotePropertyValue $totalDownloads
          } else {
            $master[0].DownloadCount = $totalDownloads
          }

          ($master | ConvertTo-Json -Depth 20 -AsArray) + "`n" | Set-Content -NoNewline:$false -Encoding UTF8 $masterPath

      - name: Commit refreshed manifest
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add pluginmaster.json
          if ((git diff --cached --name-only).Count -eq 0) {
            Write-Host "Download count already up to date."
            exit 0
          }

          git commit -m "ci: refresh download count [skip ci]"
          git push origin HEAD:main

      - name: Purge jsDelivr cache
        shell: pwsh
        run: |
          $purgeUrls = @(
            "https://purge.jsdelivr.net/gh/InTheWind222/SmartBlockChecker@main/pluginmaster.json",
            "https://purge.jsdelivr.net/gh/InTheWind222/SmartBlockCheccker@main/pluginmaster.json"
          )
          foreach ($url in $purgeUrls) {
            try {
              Invoke-WebRequest -UseBasicParsing -Uri $url | Out-Null
              Write-Host "Purged: $url"
            } catch {
              Write-Warning "Purge failed: $url -- $($_.Exception.Message)"
            }
          }
